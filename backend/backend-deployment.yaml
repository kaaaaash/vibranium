apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibranium-backend
  namespace: team-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibranium-backend
  template:
    metadata:
      labels:
        app: vibranium-backend
    spec:
      containers:
      - name: backend
        image: 974066991644.dkr.ecr.ap-south-1.amazonaws.com/vibranium-test:backend-latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: vibranium-backend
  namespace: team-infra
spec:
  selector:
    app: vibranium-backend
  ports:
  - port: 8000
    targetPort: 8000